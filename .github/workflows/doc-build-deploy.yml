name: Document Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow pushing packages to GHCR
permissions:
  contents: read
  packages: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  DOCKERHUB_IMAGE: goldenpotato137/potatovn.net:latest
  GHCR_IMAGE: ghcr.io/goldenpotato137/potatovn.net:latest

  IMAGE_TAR: potatovn-net-image.tar.gz

  DEPLOY_HOST: potatovn.net
  DEPLOY_USER: goldenpotato

  CONTAINER_NAME: potatovn.net
  HOST_PORT: 9002
  CONTAINER_PORT: 80

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Dependencies And Build
        run: |
          npm install
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          cd .vitepress/dist

          docker build \
            --tag "$DOCKERHUB_IMAGE" \
            --tag "$GHCR_IMAGE" \
            .

      - name: Push Docker image to Docker Hub and GHCR
        run: |
          docker push "$DOCKERHUB_IMAGE"
          docker push "$GHCR_IMAGE"

      - name: Save Docker image as tar.gz
        run: |
          docker save "$DOCKERHUB_IMAGE" "$GHCR_IMAGE" | gzip > "$IMAGE_TAR"

          echo "Docker image archive generated:"
          ls -lh "$IMAGE_TAR"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: potatovn-net-docker-image
          path: ${{ env.IMAGE_TAR }}
          retention-days: 1

      - name: Verify build and image push
        run: |
          echo "The image has been successfully pushed to container registries."
          echo "Docker Hub image: $DOCKERHUB_IMAGE"
          echo "GHCR image: $GHCR_IMAGE"
          echo "Docker image archive: $IMAGE_TAR"

  deploy-to-my-server:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: potatovn-net-docker-image
          path: .

      - name: Setup Private Key
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"

          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload Docker image to server
        run: |
          echo "Uploading Docker image archive to server..."
          ls -lh "$IMAGE_TAR"

          scp "$IMAGE_TAR" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/$IMAGE_TAR"

      - name: Deploy on server
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            set -e

            echo 'Starting deployment...'

            echo 'Loading Docker image from uploaded archive...'
            gzip -dc /tmp/$IMAGE_TAR | docker load

            echo 'Checking loaded images...'
            docker images | grep 'potatovn.net' || true

            echo 'Stop old container if exists...'
            docker stop $CONTAINER_NAME || true

            echo 'Remove old container if exists...'
            docker rm $CONTAINER_NAME || true

            echo 'Run new container...'
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p $HOST_PORT:$CONTAINER_PORT \
              $GHCR_IMAGE

            echo 'Cleaning uploaded image archive...'
            rm -f /tmp/$IMAGE_TAR

            echo 'Deployment completed.'
          "
